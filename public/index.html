<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>南京 AI 语音助手 · 南京口音强化版 V4</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: rgba(255,255,255,0.08);
      --panel2: rgba(255,255,255,0.12);
      --text: #f4f6fb;
      --muted: #aeb6c8;
      --accent: #ff8a3d;
      --accent2: #ffd0aa;
      --danger: #ff6b6b;
      --ok: #65d39d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,138,61,.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(100,120,255,.18), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    .app { width: min(1020px, 94vw); margin: 0 auto; padding: 36px 0 28px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 22px; }
    .brand h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 46px); letter-spacing: -0.04em; }
    .brand p { margin: 0; color: var(--muted); line-height: 1.6; }
    .badge { padding: 9px 13px; border-radius: 999px; background: var(--panel); color: var(--accent2); border: 1px solid rgba(255,255,255,.1); white-space: nowrap; }
    .panel { background: rgba(15,17,23,.74); border: 1px solid rgba(255,255,255,.12); box-shadow: 0 24px 90px rgba(0,0,0,.32); border-radius: 28px; overflow: hidden; backdrop-filter: blur(18px); }
    .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 18px; border-bottom: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.03); }
    select, button, textarea { font: inherit; }
    select { background: var(--panel2); color: var(--text); border: 1px solid rgba(255,255,255,.16); border-radius: 14px; padding: 10px 13px; outline: none; }
    .status { color: var(--muted); margin-left: auto; font-size: 14px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .chat { height: min(58vh, 560px); overflow: auto; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 82%; padding: 14px 16px; border-radius: 18px; line-height: 1.62; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #ffad69); color: #1b0d04; border-bottom-right-radius: 6px; }
    .msg.bot { align-self: flex-start; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.1); border-bottom-left-radius: 6px; }
    .meta { margin-top: 8px; font-size: 12px; color: var(--muted); border-top: 1px solid rgba(255,255,255,.1); padding-top: 8px; }
    .composer { padding: 18px; border-top: 1px solid rgba(255,255,255,.1); display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end; }
    textarea { width: 100%; min-height: 54px; max-height: 150px; resize: vertical; border: 1px solid rgba(255,255,255,.15); border-radius: 18px; padding: 14px 15px; color: var(--text); background: rgba(255,255,255,.08); outline: none; line-height: 1.5; }
    button { border: 0; border-radius: 16px; padding: 14px 18px; cursor: pointer; color: #1b0d04; background: var(--accent); font-weight: 700; min-height: 54px; }
    button.secondary { color: var(--text); background: rgba(255,255,255,.11); border: 1px solid rgba(255,255,255,.14); }
    button:disabled { cursor: not-allowed; opacity: .58; }
    .tips { margin-top: 14px; color: var(--muted); line-height: 1.7; font-size: 14px; }
    code { color: var(--accent2); }
    .accent-note { color: var(--accent2); }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .composer { grid-template-columns: 1fr; }
      .msg { max-width: 94%; }
      .status { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <h1>南京 AI 语音助手</h1>
        <p>V4：南京口音强化，加入强度控制、南京话脚本、Gemini TTS 导演式口音提示。</p>
      </div>
      <div class="badge">南京口音增强 · Gemini TTS · No Build</div>
    </header>

    <section class="panel">
      <div class="toolbar">
        <label>
          模式：
          <select id="mode">
            <option value="local" selected>南京味普通话</option>
            <option value="dialect">轻南京话</option>
            <option value="deep">老南京试验</option>
            <option value="normal">普通话</option>
          </select>
        </label>
        <label>
          口音强度：
          <select id="accent">
            <option value="light">轻一点</option>
            <option value="strong" selected>来点南京味</option>
            <option value="old">老南京一点</option>
          </select>
        </label>
        <button class="secondary" id="healthBtn">检查后端</button>
        <button class="secondary" id="ttsTestBtn">测试南京口音</button>
        <span class="status" id="status">准备好了</span>
      </div>

      <div class="chat" id="chat">
        <div class="msg bot">你好啊，我是南京 AI 助手。V4 把南京味推得更明显一点了：文字会更本地化，TTS 也会收到更强的南京/Jianghuai Mandarin 口音提示。先点“测试南京口音”听一下。</div>
      </div>

      <div class="composer">
        <textarea id="input" placeholder="比如：今天南京适合去哪玩？或者：我今天有点累，你安慰我两句。"></textarea>
        <button class="secondary" id="micBtn">🎙️ 说话</button>
        <button id="sendBtn">发送</button>
      </div>
    </section>

    <div class="tips">
      <span class="accent-note">提示：</span>V4 会尽量把 Gemini TTS 往“南京腔普通话”推，但通用 TTS 不是南京本地人声库。真正原生南京口音，需要后续接南京本地人录音的声音克隆或微调 TTS 服务。
    </div>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const healthBtn = document.getElementById('healthBtn');
    const ttsTestBtn = document.getElementById('ttsTestBtn');
    const mode = document.getElementById('mode');
    const accent = document.getElementById('accent');
    const statusEl = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    function setStatus(text, type = '') {
      statusEl.textContent = text;
      statusEl.className = 'status ' + type;
    }

    function addMessage(role, text, meta = '') {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = meta;
        el.appendChild(metaEl);
      }
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    function appendMeta(messageEl, meta) {
      if (!meta) return;
      const metaEl = document.createElement('div');
      metaEl.className = 'meta';
      metaEl.textContent = meta;
      messageEl.appendChild(metaEl);
      chat.scrollTop = chat.scrollHeight;
    }

    async function speakWithGemini(text, messageEl = null) {
      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, mode: mode.value, accent: accent.value })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'TTS unavailable');
        if (!data.audioBase64) throw new Error('No audio');
        setStatus(`正在播放 Gemini TTS：${data.voice || 'voice'} · ${data.accent || 'accent'}`, 'ok');
        if (messageEl && data.speechScript && data.speechScript !== text) {
          appendMeta(messageEl, 'TTS 南京话脚本：' + data.speechScript);
        }
        const audio = new Audio(`data:${data.mimeType || 'audio/wav'};base64,${data.audioBase64}`);
        await audio.play();
      } catch (err) {
        console.warn('Gemini TTS failed, using browser fallback:', err);
        setStatus('Gemini TTS 失败，已回退浏览器朗读。去 Railway Logs 看 [tts error]', 'err');
        if ('speechSynthesis' in window) {
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'zh-CN';
          u.rate = accent.value === 'old' ? 0.82 : 0.88;
          u.pitch = 1.03;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(u);
        }
      }
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      addMessage('user', message);
      const pending = addMessage('bot', '正在想，稍等一下下…');
      sendBtn.disabled = true;
      micBtn.disabled = true;
      setStatus('正在请求 Gemini…');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, mode: mode.value, accent: accent.value })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || '请求失败');
        pending.textContent = data.reply;
        setStatus('文字回复完成，正在生成南京口音语音…', 'ok');
        speakWithGemini(data.reply, pending);
      } catch (err) {
        pending.textContent = '出错了：' + err.message;
        setStatus('请求失败', 'err');
      } finally {
        sendBtn.disabled = false;
        micBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    healthBtn.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        setStatus(data.hasGeminiKey ? `后端正常：${data.app} · ${data.ttsVoice}` : '后端正常，但缺少 GEMINI_API_KEY', data.hasGeminiKey ? 'ok' : 'err');
      } catch {
        setStatus('后端连接失败', 'err');
      }
    });

    ttsTestBtn.addEventListener('click', async () => {
      setStatus('正在测试 Gemini 南京口音…');
      try {
        const qs = new URLSearchParams({ mode: mode.value, accent: accent.value });
        const res = await fetch('/api/tts-test?' + qs.toString());
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.audioBase64) throw new Error(data.error || 'TTS 测试失败');
        setStatus(`Gemini 南京口音测试成功：${data.voice || ''} · ${data.accent || ''}`, 'ok');
        addMessage('bot', '正在播放测试音频。', data.speechScript ? 'TTS 南京话脚本：' + data.speechScript : '');
        const audio = new Audio(`data:${data.mimeType || 'audio/wav'};base64,${data.audioBase64}`);
        await audio.play();
      } catch (err) {
        setStatus('TTS 测试失败：' + err.message, 'err');
      }
    });

    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.textContent = '不支持语音';
    } else {
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => setStatus('正在听你说话…');
      recognition.onerror = (e) => setStatus('语音识别失败：' + e.error, 'err');
      recognition.onend = () => {
        if (!input.value.trim()) setStatus('准备好了');
      };
      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        input.value = text;
        setStatus('已识别：' + text, 'ok');
        setTimeout(sendMessage, 200);
      };

      micBtn.addEventListener('click', () => {
        try {
          recognition.start();
        } catch {
          setStatus('麦克风已经在工作', 'err');
        }
      });
    }
  </script>
</body>
</html>
